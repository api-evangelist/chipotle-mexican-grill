aid: chipotle-mexican-grill
name: Chipotle Mexican Grill
x-type: company
description: >-
  Chipotle Mexican Grill is a Fortune 500 fast-casual restaurant chain serving
  burritos, bowls, tacos, salads, and quesadillas made with responsibly sourced,
  classically-cooked, real ingredients. Founded in 1993 in Denver, Colorado and
  headquartered in Newport Beach, California, Chipotle operates more than 3,500
  restaurants across the United States, Canada, the United Kingdom, France,
  Germany, Kuwait, and the United Arab Emirates. The company is widely
  recognized as a digital ordering and loyalty leader in the restaurant
  industry through its Chipotle Rewards program, native iOS and Android apps,
  and digital ordering platforms (web ordering, group ordering, and catering).
  Chipotle does not currently publish a public consumer-facing developer API
  catalog; partner integrations such as third-party delivery (DoorDash,
  Uber Eats, Grubhub) are managed through bilateral agreements, and supplier
  and franchise integrations occur through internal portals.
